<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}My App{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
      <div class="container">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav custom-nav-links">
            <li class="nav-item">
              <a class="nav-link nav-link-login" href="{{ url_for('login') }}"
                >Login</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link nav-link-myprofile"
                href="{{ url_for('myprofile') }}"
                >My Profile</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link nav-link-nutrition"
                href="{{ url_for('nutrition') }}"
                >Nutrition</a
              >
            </li>

            <li class="nav-item">
              <a
                class="nav-link nav-link-exercise"
                href="{{ url_for('exercise') }}"
                >Exercise</a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link nav-link-ai" href="{{ url_for('AI') }}">AI</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Flash messages container, use a with construct to assign the result of calling get_flashed_messages() 
 to a messages variable, all in the context of the template. The get_flashed_messages() function comes from Flask, 
 and returns a list of all the messages that have been registered with flash() previously.   -->
    <div class="container mt-4">
      {% with messages = get_flashed_messages() %} {% if messages %} {% for
      message in messages %}
      <div class="alert alert-info" role="alert">{{ message }}</div>
      {% endfor %} {% endif %} {% endwith %} {% block content %}{% endblock %}
    </div>
  </body>
</html>
